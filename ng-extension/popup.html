<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NodeGhost Memory</title>
<style>
  :root {
    --bg:#080b0f;--bg2:#0d1117;--surface:#111820;--border:rgba(255,255,255,0.07);
    --ghost:#00e5ff;--ghost-d:rgba(0,229,255,0.08);--text:#e8edf2;--mid:#9aa5b4;
    --dim:#6b7a8d;--green:#00e5a0;--red:#ff4d6d;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:340px;min-height:200px;max-height:560px;background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;font-size:12px;overflow:hidden;}
  .header{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,11,15,0.95);}
  .logo{font-family:'Space Grotesk','Arial',sans-serif;font-weight:800;font-size:15px;letter-spacing:-0.3px;}
  .logo span{color:var(--ghost);}
  .logo small{font-family:'DM Mono',monospace;font-weight:400;font-size:9px;letter-spacing:2px;color:var(--dim);margin-left:6px;}
  .status-pill{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:10px;}
  .status-pill.on{background:rgba(0,229,160,0.12);border:1px solid rgba(0,229,160,0.25);color:var(--green);}
  .status-pill.off{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.2);color:var(--red);}
  .tabs{display:flex;border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:9px 0;text-align:center;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);cursor:pointer;border:none;background:none;font-family:inherit;transition:all 0.15s;border-bottom:2px solid transparent;}
  .tab.active{color:var(--ghost);border-bottom-color:var(--ghost);}
  .tab:hover:not(.active){color:var(--mid);}
  .tab-content{display:none;}
  .tab-content.active{display:block;}
  .memory-stats{display:flex;border-bottom:1px solid var(--border);}
  .stat{flex:1;padding:12px 16px;text-align:center;border-right:1px solid var(--border);}
  .stat:last-child{border-right:none;}
  .stat-value{font-size:22px;font-weight:700;color:var(--ghost);font-family:'Space Grotesk',sans-serif;line-height:1;margin-bottom:4px;}
  .stat-label{font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
  .memory-list-wrap{max-height:240px;overflow-y:auto;padding:8px 0;}
  .memory-list-wrap::-webkit-scrollbar{width:3px;}
  .memory-list-wrap::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);}
  .memory-item{padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:flex-start;gap:8px;}
  .memory-item:hover{background:rgba(255,255,255,0.02);}
  .memory-item-text{flex:1;color:var(--mid);line-height:1.5;font-size:11px;}
  .memory-item-source{font-size:9px;color:var(--dim);margin-top:2px;letter-spacing:0.5px;}
  .memory-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;flex-shrink:0;padding:0;transition:color 0.15s;margin-top:1px;}
  .memory-del:hover{color:var(--red);}
  .empty-msg{padding:24px 16px;text-align:center;color:var(--dim);font-size:11px;letter-spacing:0.5px;line-height:1.8;opacity:0.7;}
  .memory-actions{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;}
  .manual-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:7px 10px;outline:none;transition:border-color 0.15s;}
  .manual-input:focus{border-color:rgba(0,229,255,0.3);}
  .manual-input::placeholder{color:var(--dim);}
  .btn{background:var(--ghost-d);border:1px solid rgba(0,229,255,0.2);color:var(--ghost);font-family:inherit;font-size:10px;letter-spacing:0.5px;padding:7px 12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .btn:hover{background:rgba(0,229,255,0.15);}
  .btn.danger{background:rgba(255,77,109,0.08);border-color:rgba(255,77,109,0.2);color:var(--red);}
  .btn.danger:hover{background:rgba(255,77,109,0.15);}
  .settings-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
  .field-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px;}
  .field-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:8px 12px;outline:none;transition:border-color 0.15s;}
  .field-input:focus{border-color:rgba(0,229,255,0.3);}
  .field-input::placeholder{color:var(--dim);}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;}
  .toggle-label{font-size:11px;color:var(--mid);}
  .toggle{position:relative;width:36px;height:20px;}
  .toggle input{opacity:0;width:0;height:0;}
  .toggle-slider{position:absolute;inset:0;cursor:pointer;background:var(--surface);border:1px solid var(--border);transition:0.2s;border-radius:20px;}
  .toggle-slider:before{content:'';position:absolute;height:12px;width:12px;left:3px;bottom:3px;background:var(--dim);transition:0.2s;border-radius:50%;}
  .toggle input:checked+.toggle-slider{background:var(--ghost-d);border-color:rgba(0,229,255,0.3);}
  .toggle input:checked+.toggle-slider:before{background:var(--ghost);transform:translateX(16px);}
  .save-btn{width:100%;background:var(--ghost);border:none;color:var(--bg);font-family:inherit;font-size:11px;letter-spacing:1px;padding:10px;cursor:pointer;transition:background 0.15s;}
  .save-btn:hover{background:#33eaff;}
  .save-msg{font-size:10px;color:var(--green);text-align:center;letter-spacing:0.5px;min-height:16px;}
  .footer{padding:8px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(8,11,15,0.5);}
  .footer-text{font-size:9px;color:var(--dim);letter-spacing:0.5px;}
  .footer-link{color:var(--ghost);text-decoration:none;font-size:9px;letter-spacing:0.5px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">Node<span>Ghost</span> <small>MEMORY</small></div>
  <div class="status-pill off" id="statusPill">SETUP</div>
</div>

<div class="tabs">
  <button class="tab active" id="tabMemory">Memory</button>
  <button class="tab" id="tabSettings">Settings</button>
</div>

<div class="tab-content active" id="tab-memory">
  <div class="memory-stats">
    <div class="stat">
      <div class="stat-value" id="memCount">0</div>
      <div class="stat-label">Memories</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="docCount">0</div>
      <div class="stat-label">Documents</div>
    </div>
  </div>
  <div class="memory-list-wrap">
    <div id="memoryList">
      <div class="empty-msg">No memories yet.<br>Start chatting with any NodeGhost-powered app.</div>
    </div>
  </div>
  <div class="memory-actions">
    <input type="text" class="manual-input" id="manualInput" placeholder="Add a memory manually...">
    <button class="btn" id="addBtn">+ Add</button>
    <button class="btn danger" id="clearBtn">✕ All</button>
  </div>
</div>

<div class="tab-content" id="tab-settings">
  <div class="settings-body">
    <div>
      <div class="field-label">NodeGhost API Key</div>
      <input type="password" class="field-input" id="apiKeyInput" placeholder="ng-xxxxxxxxxxxxxxxx">
    </div>
    <div>
      <div class="field-label">User ID</div>
      <input type="text" class="field-input" id="userIdInput" placeholder="default">
    </div>
    <div>
      <div class="field-label">Inference URL</div>
      <input type="text" class="field-input" id="inferenceUrlInput" placeholder="https://nodeghost.ai/v1">
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Memory enabled</span>
      <label class="toggle">
        <input type="checkbox" id="enabledToggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="save-msg" id="saveMsg"></div>
    <button class="save-btn" id="saveBtn">SAVE SETTINGS</button>
  </div>
</div>

<div class="footer">
  <span class="footer-text">v0.1.0 · Private · Local</span>
  <a href="https://nodeghost.ai" target="_blank" class="footer-link">nodeghost.ai ↗</a>
</div>

<script src="popup.js"></script>
</body>
</html>
